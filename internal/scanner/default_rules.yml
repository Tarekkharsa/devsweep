signatures:
  - category: protected
    tool: System
    binary:
      - ninjarmm
      - jamf
      - launchd
      - kernel_task
      - WindowServer

  - category: dev_server
    tool: Vite
    binary:
      - vite
    cmdline:
      - "vite dev"
      - "vite serve"
      - "vite preview"
      - "vite/bin/vite"

  - category: dev_server
    tool: Next.js
    binary:
      - next-server
    cmdline:
      - "next dev"
      - "next start"
      - "next-server"
      - ".next/server"

  - category: dev_server
    tool: Webpack
    binary:
      - webpack-dev-server
    cmdline:
      - "webpack serve"
      - "webpack-dev-server"

  - category: dev_server
    tool: Remix
    binary:
      - remix-serve
    cmdline:
      - "remix dev"

  - category: dev_server
    tool: Nuxt
    binary:
      - nuxt
    cmdline:
      - "nuxt dev"

  - category: dev_server
    tool: Astro
    binary:
      - astro
    cmdline:
      - "astro dev"

  - category: dev_server
    tool: Gatsby
    binary:
      - gatsby
    cmdline:
      - "gatsby develop"

  - category: dev_server
    tool: Turbopack
    binary:
      - turbopack
    cmdline:
      - turbopack
      - "turbo dev"

  - category: ai_agent
    tool: MCP Server
    binary:
      - mcp-remote
      - mcp-server
    cmdline:
      - mcp-remote
      - mcp-server
      - modelcontextprotocol

  - category: ai_agent
    tool: Codex
    binary:
      - codex
    cmdline:
      - codex

  - category: ai_agent
    tool: Claude
    cmdline:
      - claude
      - pi-coding-agent

  - category: ai_agent
    tool: Copilot
    cmdline:
      - copilot

  - category: ai_agent
    tool: OpenCode
    cmdline:
      - opencode

  - category: ai_agent
    tool: Cursor
    cmdline:
      - cursor-agent

  - category: package_manager
    tool: npm
    cmdline:
      - "npm install"
      - "npm ci"
      - "npm run"

  - category: package_manager
    tool: pnpm
    cmdline:
      - "pnpm install"
      - "pnpm run"
      - "pnpm dev"

  - category: package_manager
    tool: yarn
    cmdline:
      - "yarn install"
      - "yarn run"
      - "yarn dev"

  - category: package_manager
    tool: bun
    cmdline:
      - "bun install"
      - "bun run"

  - category: runtime
    tool: Node.js
    binary:
      - node

  - category: runtime
    tool: Deno
    binary:
      - deno

  - category: runtime
    tool: Bun
    binary:
      - bun

  - category: runtime
    tool: Python
    binary:
      - python
      - python3

  - category: runtime
    tool: Ruby
    binary:
      - ruby

  - category: runtime
    tool: Java
    binary:
      - java

rules:
  stale:
    max_age: "24h"
  duplicates:
    max_duplicates: 1
  cpu_hog:
    cpu_percent: 50
    duration: "5m"
  memory_bloat:
    max_memory: "500MB"
    dev_server_max_memory: "1500MB"
  orphan:
    enabled: true
